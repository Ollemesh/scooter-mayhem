<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SCOOTER MAYHEM 🛴💥</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#111; overflow:hidden; font-family:'Courier New',monospace; touch-action:none; }
#canvas { display:block; image-rendering:pixelated; }

#hud {
  position:fixed; top:0; left:0; width:100%; height:100%;
  pointer-events:none; z-index:10;
}
#speedometer {
  position:absolute; bottom:30px; right:20px;
  background:rgba(0,0,0,0.75); border:2px solid #00ffcc;
  border-radius:10px; padding:10px 18px; text-align:center;
  color:#00ffcc; min-width:90px;
}
#speed-value { font-size:38px; font-weight:bold; display:block; line-height:1; }
.unit { font-size:12px; opacity:0.7; }
#score-bar {
  position:absolute; top:16px; left:16px;
  background:rgba(0,0,0,0.75); border:2px solid #ffcc00;
  border-radius:10px; padding:8px 14px; color:#ffcc00;
}
#score-bar div { font-size:16px; margin:2px 0; }
#boost-container {
  position:absolute; bottom:30px; left:16px;
  background:rgba(0,0,0,0.75); border:2px solid #ff6600;
  border-radius:8px; padding:6px 10px; width:160px;
}
.bar-label { color:#ff6600; font-size:10px; margin-bottom:3px; }
.bar-track { background:#333; border-radius:3px; height:8px; overflow:hidden; }
.bar-fill { height:100%; border-radius:3px; transition:width 0.1s; }
#boost-fill { background:linear-gradient(90deg,#ff4400,#ffcc00); }
#integrity-container {
  position:absolute; bottom:72px; left:16px;
  background:rgba(0,0,0,0.75); border:2px solid #ff3333;
  border-radius:8px; padding:6px 10px; width:160px;
}
#integrity-fill { background:linear-gradient(90deg,#ff0000,#00ff44); }

#trick-banner {
  position:absolute; top:42%; left:50%; transform:translate(-50%,-50%);
  font-size:30px; font-weight:bold; color:#fff;
  text-shadow:0 0 16px #ff6600, 2px 2px 0 #000;
  text-align:center; pointer-events:none;
  transition:opacity 0.3s;
}

#overlay {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.88); z-index:100;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  color:#fff; text-align:center;
}
#overlay h1 { font-size:clamp(28px,6vw,52px); color:#ffcc00; text-shadow:0 0 20px #ff6600; margin-bottom:8px; }
#overlay .subtitle { font-size:clamp(12px,2.5vw,18px); color:#aaa; margin-bottom:28px; max-width:520px; line-height:1.5; }
.big-btn {
  background:#ffcc00; color:#111; border:none;
  font-size:clamp(16px,3vw,22px); font-family:'Courier New',monospace;
  font-weight:bold; padding:14px 40px; border-radius:8px;
  cursor:pointer; margin:6px; pointer-events:all;
  transition:transform 0.1s, background 0.1s;
}
.big-btn:hover { background:#fff; transform:scale(1.04); }
.big-btn.red { background:#ff3333; color:#fff; }

#shop-overlay {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.92); z-index:200;
  display:none; flex-direction:column; align-items:center; justify-content:center;
  color:#fff;
}
#shop-overlay h2 { color:#ffcc00; font-size:26px; margin-bottom:16px; }
#shop-grid { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; max-width:700px; }
.shop-item {
  background:#1a1a1a; border:2px solid #444; border-radius:8px;
  padding:12px 16px; width:180px; cursor:pointer; pointer-events:all;
  transition:border-color 0.15s;
}
.shop-item:hover { border-color:#ffcc00; }
.shop-item .si-name { font-size:13px; color:#ffcc00; margin-bottom:4px; }
.shop-item .si-level { font-size:11px; color:#888; margin-bottom:6px; }
.shop-item .si-cost { font-size:14px; color:#00ffcc; font-weight:bold; }
.shop-item .si-bars { display:flex; gap:3px; margin-top:6px; }
.shop-item .si-bar { height:6px; flex:1; border-radius:2px; background:#333; }
.shop-item .si-bar.filled { background:#ffcc00; }
#shop-coins { color:#ffcc00; font-size:18px; margin-bottom:12px; }
#shop-close { margin-top:14px; }

/* Mobile controls */
#mobile-controls {
  position:fixed; bottom:0; left:0; width:100%; height:220px;
  pointer-events:none; z-index:50; display:none;
}
#joystick-zone {
  position:absolute; bottom:20px; left:20px;
  width:130px; height:130px; pointer-events:all;
}
#joystick-base {
  position:absolute; top:0; left:0; width:130px; height:130px;
  background:rgba(255,255,255,0.1); border:2px solid rgba(255,255,255,0.3);
  border-radius:50%;
}
#joystick-knob {
  position:absolute; top:50%; left:50%;
  width:50px; height:50px; margin:-25px 0 0 -25px;
  background:rgba(255,255,255,0.5); border-radius:50%;
}
#action-btns {
  position:absolute; bottom:20px; right:16px;
  display:flex; flex-direction:column; gap:8px; pointer-events:all;
}
.act-btn {
  width:64px; height:64px; border-radius:50%;
  border:2px solid rgba(255,255,255,0.4);
  background:rgba(0,0,0,0.5); color:#fff;
  font-size:13px; font-weight:bold; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
#btn-boost { border-color:#ff6600; color:#ff6600; }
#btn-trick { border-color:#00ffcc; color:#00ffcc; }
#btn-shop  { border-color:#ffcc00; color:#ffcc00; font-size:10px; }

@media (hover:none) and (pointer:coarse) {
  #mobile-controls { display:block; }
  #speedometer { bottom:240px; }
  #boost-container { bottom:240px; }
  #integrity-container { bottom:282px; }
}
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div id="hud">
  <div id="score-bar">
    <div>💰 <span id="coins">0</span></div>
    <div>🏆 <span id="score">0</span></div>
    <div id="combo-display" style="display:none;color:#ff6600">🔥 x<span id="combo-mult">1</span></div>
  </div>
  <div id="speedometer">
    <span id="speed-value">0</span>
    <span class="unit">KM/H</span>
  </div>
  <div id="boost-container">
    <div class="bar-label">⚡ BOOST</div>
    <div class="bar-track"><div class="bar-fill" id="boost-fill" style="width:100%"></div></div>
  </div>
  <div id="integrity-container">
    <div class="bar-label">🔧 INTEGRITY</div>
    <div class="bar-track"><div class="bar-fill" id="integrity-fill" style="width:100%"></div></div>
  </div>
  <div id="trick-banner"></div>
</div>

<!-- Start screen -->
<div id="overlay">
  <h1>🛴 SCOOTER MAYHEM</h1>
  <p class="subtitle">Гоняй по постсоветскому городу. Пугай прохожих. Устраивай гонки с курьерами. Разгонись до максимума — и красиво упади.<br><br>
    <small style="color:#666">WASD / стрелки — движение &nbsp;|&nbsp; SPACE — буст &nbsp;|&nbsp; TAB — магазин &nbsp;|&nbsp; F — трюк</small>
  </p>
  <button class="big-btn" onclick="startGame()">🚀 ПОЕХАЛИ</button>
</div>

<!-- Shop -->
<div id="shop-overlay">
  <h2>🛒 МАГАЗИН</h2>
  <div id="shop-coins">💰 0</div>
  <div id="shop-grid"></div>
  <button class="big-btn" id="shop-close" onclick="closeShop()">✕ ЗАКРЫТЬ (TAB)</button>
</div>

<!-- Mobile -->
<div id="mobile-controls">
  <div id="joystick-zone">
    <div id="joystick-base"></div>
    <div id="joystick-knob"></div>
  </div>
  <div id="action-btns">
    <button class="act-btn" id="btn-boost">⚡<br>BOOST</button>
    <button class="act-btn" id="btn-trick">🤸<br>TRICK</button>
    <button class="act-btn" id="btn-shop">🛒<br>SHOP</button>
  </div>
</div>

<script>
'use strict';

// ─── CANVAS SETUP ────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, SCALE;
function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width  = W;
  canvas.height = H;
  SCALE = Math.min(W, H) / 520;
}
resize();
window.addEventListener('resize', resize);

// ─── CONFIG ──────────────────────────────────────────────────────────────────
const C = {
  TILE:       32,       // px per tile (world units)
  GW:         22,       // grid width in blocks
  GH:         22,       // grid height in blocks
  ROAD:       3,        // road width in tiles
  BLOCK:      8,        // building block size in tiles
  // physics
  FRICTION:   0.88,
  TURN_SPEED: 0.055,
  ACCEL:      0.18,
  TOP_SPEED:  8.0,
  BOOST_MULT: 1.65,
  BOOST_DUR:  300,
  BOOST_REGEN:2,
  CRASH_SPD:  4.5,      // min speed for real crash
  // scoring
  SCARE_BASE: 15,
  RACE_WIN:   300,
};

// Palette: [grey/Soviet, vivid/renovated]
const PAL = {
  asphalt:    ['#2e2e30','#3c3c50'],
  road_mark:  ['#3a3a3a','#888866'],
  sidewalk:   ['#3a3938','#a09070'],
  grass:      ['#2e302a','#4a8a3a'],
  tree_trunk: ['#2e2820','#5a3c20'],
  tree_leaf:  ['#282e22','#3a8a2a'],
  bld_panel:  ['#363638','#9a8c7e'],
  bld_khrush: ['#38383a','#c8b88a'],
  bld_soviet: ['#34343a','#b0a898'],
  bld_win_dark: ['#1a1a1e','#1a2a3a'],
  bld_win_lit:  ['#242428','#e8d870'],
  snow:       ['#5a5a60','#e8e8f0'],
  dirt:       ['#302c28','#6a5a40'],
  sky:        ['#1a1a22','#5a8abf'],
};

function lerpHex(a, b, t) {
  t = Math.max(0, Math.min(1, t));
  const ai = parseInt(a.slice(1),16), bi = parseInt(b.slice(1),16);
  const ar=(ai>>16)&255, ag=(ai>>8)&255, ab=ai&255;
  const br=(bi>>16)&255, bg=(bi>>8)&255, bb=bi&255;
  const rr=Math.round(ar+t*(br-ar));
  const rg=Math.round(ag+t*(bg-ag));
  const rb=Math.round(ab+t*(bb-ab));
  return '#'+((rr<<16)|(rg<<8)|rb).toString(16).padStart(6,'0');
}
function col(key, v) {
  const p = PAL[key];
  if (!p) return '#ff00ff';
  return lerpHex(p[0], p[1], v);
}

// ─── GAME STATE ──────────────────────────────────────────────────────────────
const GS = {
  mode: 'menu',     // menu | play | shop | crash | dead
  score: 0,
  coins: 0,
  vitality: 0,
  targetVitality: 0,
  comboMult: 1,
  comboTimer: 0,
  trickTimer: 0,
  trickNames: [],
  bannerTimer: 0,
  bannerText: '',
};

const UPGRADES = [
  { id:'motor',  name:'⚡ Мотор',    desc:'Скорость и ускорение',       costs:[80,160,300,550,900],  maxLevel:5 },
  { id:'deck',   name:'🛹 Дека',     desc:'Управляемость и повороты',   costs:[60,120,250,450,750],  maxLevel:5 },
  { id:'battery',name:'🔋 Батарея',  desc:'Длительность буста',         costs:[70,140,260,480,800],  maxLevel:5 },
  { id:'wheels', name:'🏎️ Колёса',  desc:'Дрифт и скольжение',         costs:[90,180,320,600,950],  maxLevel:5 },
  { id:'frame',  name:'💥 Рама',     desc:'Больше кусков при краше',    costs:[50,100,200,400,700],  maxLevel:5 },
];
const UP = { motor:0, deck:0, battery:0, wheels:0, frame:0 };

function upStat() {
  const s = {};
  s.topSpeed    = C.TOP_SPEED   * (1 + UP.motor   * 0.22);
  s.accel       = C.ACCEL       * (1 + UP.motor   * 0.18);
  s.turnSpeed   = C.TURN_SPEED  * (1 + UP.deck    * 0.15);
  s.friction    = C.FRICTION    + UP.wheels * 0.007;   // more drift
  s.boostDur    = C.BOOST_DUR   + UP.battery * 80;
  s.boostRegen  = C.BOOST_REGEN + UP.battery * 0.6;
  s.debrisParts = 4 + UP.frame * 2;
  return s;
}

// ─── WORLD GENERATION ────────────────────────────────────────────────────────
const T = C.TILE;
const STEP = C.ROAD + C.BLOCK; // tiles per city block (3+8=11)

let tileMap = [];
let buildings = [];
let trees = [];
let WORLD_W, WORLD_H;

function genWorld() {
  WORLD_W = C.GW * STEP * T;
  WORLD_H = C.GH * STEP * T;
  tileMap = [];
  buildings = [];
  trees = [];

  const TW = C.GW * STEP + C.ROAD;
  const TH = C.GH * STEP + C.ROAD;

  // Init
  for (let y = 0; y < TH; y++) {
    tileMap[y] = [];
    for (let x = 0; x < TW; x++) {
      tileMap[y][x] = { type: 'lot' };
    }
  }

  // Roads
  for (let gy = 0; gy <= C.GH; gy++) {
    const ry = gy * STEP;
    for (let ty = 0; ty < C.ROAD; ty++) {
      for (let x = 0; x < TW; x++) {
        if (tileMap[ry+ty]) tileMap[ry+ty][x] = { type: 'road' };
      }
    }
  }
  for (let gx = 0; gx <= C.GW; gx++) {
    const rx = gx * STEP;
    for (let tx = 0; tx < C.ROAD; tx++) {
      for (let y = 0; y < TH; y++) {
        if (tileMap[y] && tileMap[y][rx+tx]) tileMap[y][rx+tx] = { type: 'road' };
      }
    }
  }

  // Sidewalks (1 tile border around each block)
  for (let gy = 0; gy < C.GH; gy++) {
    for (let gx = 0; gx < C.GW; gx++) {
      const ox = gx * STEP + C.ROAD;
      const oy = gy * STEP + C.ROAD;
      for (let ty = 0; ty < C.BLOCK; ty++) {
        for (let tx = 0; tx < C.BLOCK; tx++) {
          if (ty === 0 || ty === C.BLOCK-1 || tx === 0 || tx === C.BLOCK-1) {
            const cell = tileMap[oy+ty] && tileMap[oy+ty][ox+tx];
            if (cell && cell.type === 'lot') {
              tileMap[oy+ty][ox+tx] = { type: 'sidewalk' };
            }
          }
        }
      }
    }
  }

  // Buildings
  const BLD_TYPES = ['panel','khrush','soviet'];
  for (let gy = 0; gy < C.GH; gy++) {
    for (let gx = 0; gx < C.GW; gx++) {
      // Some blocks have trees/park instead
      const roll = Math.random();
      if (roll < 0.15) {
        // Park / yard with trees
        const ox = gx * STEP + C.ROAD + 2;
        const oy = gy * STEP + C.ROAD + 2;
        const cnt = 2 + Math.floor(Math.random()*4);
        for (let i = 0; i < cnt; i++) {
          trees.push({
            x: (ox + 0.5 + Math.random()*(C.BLOCK-4)) * T,
            y: (oy + 0.5 + Math.random()*(C.BLOCK-4)) * T,
            r: 10 + Math.random()*12,
          });
        }
        continue;
      }

      const ox = gx * STEP + C.ROAD + 1;
      const oy = gy * STEP + C.ROAD + 1;
      const bw = (C.BLOCK - 2) * T;
      const bh = (C.BLOCK - 2) * T;
      const btype = BLD_TYPES[Math.floor(Math.random()*BLD_TYPES.length)];
      const floors = 3 + Math.floor(Math.random()*8);
      const id = buildings.length;
      buildings.push({
        x: ox * T, y: oy * T, w: bw, h: bh,
        type: btype, floors,
        graffiti: Math.random() < 0.3,
        stain: Math.random() < 0.45,
        snow: Math.random() * 0.5 + 0.2,
        winGrid: Math.floor(Math.random()*4)+2,
        winLitMap: Array.from({length:floors*8}, () => Math.random() < 0.4),
      });
      // mark tiles
      for (let ty = 0; ty < C.BLOCK-2; ty++) {
        for (let tx = 0; tx < C.BLOCK-2; tx++) {
          if (tileMap[oy+ty] && tileMap[oy+ty][ox+tx]) {
            tileMap[oy+ty][ox+tx] = { type:'building', bldId:id };
          }
        }
      }
    }
  }

  // Road graph for NPC routing
  buildRoadGraph();
}

// Road graph: horizontal + vertical road center lines
let roadGraph = { h:[], v:[] };
function buildRoadGraph() {
  roadGraph.h = [];
  roadGraph.v = [];
  for (let gy = 0; gy <= C.GH; gy++) {
    const y = (gy * STEP + Math.floor(C.ROAD/2)) * T + T/2;
    const xMin = Math.floor(C.ROAD/2) * T;
    const xMax = (C.GW * STEP + Math.floor(C.ROAD/2)) * T;
    roadGraph.h.push({ y, xMin, xMax });
  }
  for (let gx = 0; gx <= C.GW; gx++) {
    const x = (gx * STEP + Math.floor(C.ROAD/2)) * T + T/2;
    const yMin = Math.floor(C.ROAD/2) * T;
    const yMax = (C.GH * STEP + Math.floor(C.ROAD/2)) * T;
    roadGraph.v.push({ x, yMin, yMax });
  }
}

function isRoad(wx, wy) {
  const tx = Math.floor(wx / T);
  const ty = Math.floor(wy / T);
  const row = tileMap[ty];
  if (!row) return false;
  const cell = row[tx];
  return cell && cell.type === 'road';
}

function isBuilding(wx, wy) {
  const tx = Math.floor(wx / T);
  const ty = Math.floor(wy / T);
  const row = tileMap[ty];
  if (!row) return false;
  const cell = row[tx];
  return cell && cell.type === 'building';
}

// ─── PLAYER ──────────────────────────────────────────────────────────────────
const player = {
  x: 0, y: 0,
  vx: 0, vy: 0,
  angle: 0,          // radians, 0 = up
  speed: 0,
  boost: 300,
  boosting: false,
  integrity: 100,
  airborne: false,
  airTime: 0,
  spinning: false,
  spinAngle: 0,
  wheelie: false,
  wheelieTime: 0,
  alive: true,
  // render
  lean: 0,
};

function resetPlayer() {
  // Spawn at center road
  const cx = Math.floor(C.GW / 2) * STEP + Math.floor(C.ROAD / 2);
  const cy = Math.floor(C.GH / 2) * STEP + Math.floor(C.ROAD / 2);
  player.x = (cx + 0.5) * T;
  player.y = (cy + 0.5) * T;
  player.vx = 0; player.vy = 0;
  player.angle = 0;
  player.speed = 0;
  player.boost = upStat().boostDur;
  player.boosting = false;
  player.integrity = 100;
  player.airborne = false;
  player.airTime = 0;
  player.spinning = false;
  player.spinAngle = 0;
  player.wheelie = false;
  player.wheelieTime = 0;
  player.alive = true;
  player.lean = 0;
}

// ─── INPUT ───────────────────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Tab') { e.preventDefault(); toggleShop(); }
  if (e.code === 'KeyF' && GS.mode === 'play') doTrick();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// ─── NPCS ────────────────────────────────────────────────────────────────────
let peds = [], couriers = [], cars = [], cops = [];
let activeCourier = null;

const COURIER_GRADES = [
  { name:'Стажёр',  speed:1.2,  color:'#664400', boxColor:'#aa7700', label:'🐢', reward:80  },
  { name:'Джун',    speed:1.9,  color:'#444488', boxColor:'#6666bb', label:'🚲', reward:150 },
  { name:'Мидл',    speed:2.6,  color:'#226622', boxColor:'#448844', label:'🛵', reward:240 },
  { name:'Сеньор',  speed:3.5,  color:'#882222', boxColor:'#cc4444', label:'🔥', reward:400 },
  { name:'DEMON',   speed:4.8,  color:'#111111', boxColor:'#880000', label:'💀', reward:999 },
];

// Collect all sidewalk tile centers for pedestrian spawning
function getSidewalkSpots() {
  const spots = [];
  const TW = C.GW * STEP + C.ROAD;
  const TH = C.GH * STEP + C.ROAD;
  for (let ty = 1; ty < TH-1; ty++) {
    for (let tx = 1; tx < TW-1; tx++) {
      const cell = tileMap[ty] && tileMap[ty][tx];
      if (cell && cell.type === 'sidewalk') {
        spots.push({ x: (tx+0.5)*T, y: (ty+0.5)*T });
      }
    }
  }
  return spots;
}

function spawnPeds(count) {
  peds = [];
  const spots = getSidewalkSpots();
  if (spots.length === 0) return;
  for (let i = 0; i < count; i++) {
    const sp = spots[Math.floor(Math.random()*spots.length)];
    // Walk along the sidewalk: pick a horizontal or vertical angle (±90° aligned)
    const axisAngles = [0, Math.PI/2, Math.PI, Math.PI*1.5];
    const angle = axisAngles[Math.floor(Math.random()*axisAngles.length)];
    peds.push({
      x: sp.x, y: sp.y,
      angle,
      walkAngle: angle, // preferred walking direction
      state:'WALK',
      timer: Math.floor(Math.random()*120),
      scared: false,
    });
  }
}

function spawnCouriers(count) {
  couriers = [];
  for (let i = 0; i < count; i++) {
    const grade = COURIER_GRADES[Math.floor(Math.random()*COURIER_GRADES.length)];
    const rg = roadGraph.h[Math.floor(Math.random()*roadGraph.h.length)];
    couriers.push({
      x: rg.xMin + Math.random()*(rg.xMax-rg.xMin),
      y: rg.y,
      vx:0, vy:0,
      angle: Math.random()<0.5 ? 0 : Math.PI,
      grade,
      speed:0,
      targetSpeed: grade.speed,
      routeAxis:'h',
      routeIdx: roadGraph.h.indexOf(rg),
      routeDir: Math.random()<0.5?1:-1,
      racing: false,
      raceTimer: 0,
    });
  }
}

function spawnCars(count) {
  cars = [];
  for (let i = 0; i < count; i++) {
    const rg = roadGraph.h[1 + Math.floor(Math.random()*(roadGraph.h.length-2))];
    const dir = Math.random()<0.5?1:-1;
    const colors = ['#5a4a3a','#3a3a4e','#4a3a3a','#3e4a3a','#4a4a4a','#5a3a3a'];
    cars.push({
      x: rg.xMin + Math.random()*(rg.xMax-rg.xMin),
      y: rg.y + dir*T*0.4,   // exact lane Y from the start
      vx: 0, vy: 0,
      speed: 0,
      targetSpeed: 1.0 + Math.random()*0.8,
      angle: dir > 0 ? Math.PI/2 : -Math.PI/2,
      dir,
      routeAxis:'h',
      routeIdx: roadGraph.h.indexOf(rg),
      color: colors[Math.floor(Math.random()*colors.length)],
      w:28, h:18,
      braking: false,
    });
  }
}

function spawnCop() {
  const rg = roadGraph.h[Math.floor(Math.random()*roadGraph.h.length)];
  cops = [{
    x: rg.xMin + Math.random()*(rg.xMax-rg.xMin),
    y: rg.y,
    vx:0, vy:0,
    angle:0,
    speed:0,
    state:'IDLE',
    sirenTimer:0,
    catchDist:18,
    spawnDist: 500,
  }];
}

// ─── CRASH SYSTEM ────────────────────────────────────────────────────────────
let debris = [];
let crashPhase = null; // null | 'explode' | 'settle' | 'ambulance' | 'scoreboard'
let crashTimer = 0;
let crashScore = 0;
let ambulance = null;

function triggerCrash(impactForce) {
  if (!player.alive) return;
  player.alive = false;
  GS.mode = 'crash';
  crashPhase = 'explode';
  crashTimer = 0;
  crashScore = GS.score + Math.round(impactForce * 8);

  const st = upStat();
  const parts = st.debrisParts;
  debris = [];
  for (let i = 0; i < parts; i++) {
    const a = (Math.PI*2/parts)*i + (Math.random()-0.5)*0.5;
    const spd = 2 + Math.random()*4;
    debris.push({
      x: player.x, y: player.y,
      vx: Math.cos(a)*spd*(0.5+Math.random()),
      vy: Math.sin(a)*spd*(0.5+Math.random()),
      angle: Math.random()*Math.PI*2,
      spin: (Math.random()-0.5)*0.3,
      size: 4 + Math.random()*10,
      life: 1,
      decay: 0.008 + Math.random()*0.006,
      color: ['#888','#aaa','#666','#ffcc00','#ff6600'][Math.floor(Math.random()*5)],
    });
  }

  // Screen shake
  camShake = 18;

  // Spawn ambulance after delay
  setTimeout(() => {
    if (GS.mode !== 'crash') return;
    // Spawn from edge
    const side = Math.floor(Math.random()*4);
    let ax,ay,ava;
    if (side===0){ ax=player.x; ay=0; ava=Math.PI; }
    else if(side===1){ ax=WORLD_W; ay=player.y; ava=-Math.PI/2; }
    else if(side===2){ ax=player.x; ay=WORLD_H; ava=0; }
    else { ax=0; ay=player.y; ava=Math.PI/2; }
    ambulance = { x:ax, y:ay, vx:0, vy:0, angle:ava, speed:0, state:'APPROACH', timer:0, exploded:false };
    crashPhase = 'ambulance';
  }, 2200);

  setTimeout(() => {
    if (GS.mode === 'crash') showScoreboard();
  }, 7500);
}

function showScoreboard() {
  GS.mode = 'dead';
  const el = document.getElementById('overlay');
  el.innerHTML = `
    <h1>💥 КРАШ!</h1>
    <p class="subtitle">
      Итоговый счёт: <strong style="color:#ffcc00;font-size:1.4em">${crashScore}</strong><br>
      Заработано монет: <strong style="color:#00ffcc">${GS.coins}</strong><br>
      <br>
      Апгрейды: Мотор ${UP.motor} | Дека ${UP.deck} | Батарея ${UP.battery} | Колёса ${UP.wheels} | Рама ${UP.frame}
    </p>
    <button class="big-btn" onclick="startGame()">🔄 ЕЩЁ РАЗ</button>
    <button class="big-btn" style="background:#444;color:#ccc;font-size:14px" onclick="resetUpgrades()">Сбросить прокачку</button>
  `;
  el.style.display = 'flex';
}

function resetUpgrades() {
  UP.motor=0; UP.deck=0; UP.battery=0; UP.wheels=0; UP.frame=0;
  GS.coins=0; GS.score=0;
  startGame();
}

// ─── TRICK SYSTEM ────────────────────────────────────────────────────────────
let trickCombo = [];
let comboTimer = 0;
const COMBO_WINDOW = 180; // frames

function doTrick() {
  if (!player.alive || GS.mode !== 'play') return;
  if (player.airborne) {
    player.spinning = true;
  } else {
    player.wheelie = true;
    player.wheelieTime = 45;
  }
}

function registerTrick(name, pts) {
  GS.score += pts * GS.comboMult;
  GS.coins += Math.round(pts * 0.3 * GS.comboMult);
  trickCombo.push(name);
  comboTimer = COMBO_WINDOW;
  GS.comboMult = trickCombo.length;
  GS.bannerText = name + ' +' + (pts*GS.comboMult) + (GS.comboMult>1?' x'+GS.comboMult:'');
  GS.bannerTimer = 110;
  updateHUD();
}

// ─── CAMERA ──────────────────────────────────────────────────────────────────
let camX = 0, camY = 0, camShake = 0;

function updateCamera() {
  const tx = player.x - W/2;
  const ty = player.y - H/2;
  camX += (tx - camX) * 0.12;
  camY += (ty - camY) * 0.12;
  camX = Math.max(0, Math.min(WORLD_W - W, camX));
  camY = Math.max(0, Math.min(WORLD_H - H, camY));
  if (camShake > 0) camShake -= 1.5;
}

// ─── UPDATE ──────────────────────────────────────────────────────────────────
function updatePlayer(dt) {
  if (!player.alive) return;
  const st = upStat();

  const up    = keys['KeyW'] || keys['ArrowUp']    || joyY < -0.3;
  const down  = keys['KeyS'] || keys['ArrowDown']  || joyY >  0.3;
  const left  = keys['KeyA'] || keys['ArrowLeft']  || joyX < -0.3;
  const right = keys['KeyD'] || keys['ArrowRight'] || joyX >  0.3;
  const boost = (keys['Space'] || mobileBoost) && player.boost > 0;

  // Boost
  if (boost) {
    player.boosting = true;
    player.boost = Math.max(0, player.boost - 1);
  } else {
    player.boosting = false;
    if (player.boost < st.boostDur) player.boost += st.boostRegen * 0.016 * 60;
  }

  // Turning (speed-dependent)
  const turnFactor = 1 - Math.abs(player.speed) / (st.topSpeed * 1.8);
  if (left)  player.angle -= st.turnSpeed * Math.max(0.35, turnFactor);
  if (right) player.angle += st.turnSpeed * Math.max(0.35, turnFactor);

  // Lean for visual
  player.lean += ((right ? 1 : left ? -1 : 0) * 0.25 - player.lean) * 0.15;

  // Acceleration
  const boostMult = player.boosting ? C.BOOST_MULT : 1;
  if (up)   player.speed += st.accel * boostMult;
  if (down) player.speed -= st.accel * 0.5;

  // Apply friction
  player.speed *= st.friction + (player.boosting ? 0.01 : 0);
  player.speed = Math.max(-st.topSpeed*0.4, Math.min(st.topSpeed * boostMult, player.speed));

  // Move
  const dx = Math.sin(player.angle) * player.speed;
  const dy = -Math.cos(player.angle) * player.speed;
  const nx = player.x + dx;
  const ny = player.y + dy;

  // Collision
  const r = 10;
  let collX = false, collY = false;
  if (isBuilding(nx, player.y) || nx < r || nx > WORLD_W-r) collX = true;
  if (isBuilding(player.x, ny) || ny < r || ny > WORLD_H-r) collX = collX || false; // handled below
  if (isBuilding(player.x, ny) || ny < r || ny > WORLD_H-r) collY = true;

  if (!collX) player.x = nx;
  if (!collY) player.y = ny;

  if (collX || collY) {
    const impactSpeed = Math.abs(player.speed);
    player.speed *= -0.3;
    if (impactSpeed > C.CRASH_SPD) {
      player.integrity -= impactSpeed * 8;
      if (player.integrity <= 0) {
        triggerCrash(impactSpeed);
        return;
      }
      camShake = Math.min(12, impactSpeed * 1.5);
    }
  }

  // Wheelie
  if (player.wheelie) {
    player.wheelieTime--;
    if (player.wheelieTime <= 0) {
      player.wheelie = false;
      registerTrick('🤸 ВИЛЛИ', 20 + Math.round(Math.abs(player.speed)*5));
    }
  }

  // Vitality
  const kmh = Math.abs(player.speed) * 3.6 * 3;
  GS.targetVitality = Math.min(1, kmh / (st.topSpeed * 3.6 * 3 * 0.85));
  GS.vitality += (GS.targetVitality - GS.vitality) * 0.012;

  // Combo timer
  if (comboTimer > 0) {
    comboTimer--;
    if (comboTimer <= 0) {
      if (trickCombo.length > 1) {
        GS.bannerText = '🔥 КОМБО x' + trickCombo.length + '!';
        GS.bannerTimer = 120;
      }
      trickCombo = [];
      GS.comboMult = 1;
    }
  }

  if (GS.bannerTimer > 0) GS.bannerTimer--;

  // Scare pedestrians
  for (const p of peds) {
    if (p.state === 'FLEE') continue;
    const dist = Math.hypot(player.x - p.x, player.y - p.y);
    if (dist < 50 && Math.abs(player.speed) > 1.5) {
      const pts = Math.round(C.SCARE_BASE * (1 + Math.abs(player.speed) / 2));
      GS.score += pts;
      GS.coins += Math.round(pts * 0.2);
      GS.bannerText = '😱 ИСПУГ! +' + pts;
      GS.bannerTimer = 80;
      p.state = 'FLEE';
      p.timer = 180;
      updateHUD();
    }
  }

  // Car collision
  for (const car of cars) {
    const dist = Math.hypot(player.x - car.x, player.y - car.y);
    if (dist < 24) {
      const impact = Math.abs(player.speed) + car.speed;
      player.integrity -= impact * 5;
      player.speed *= -0.4;
      car.speed *= 0.2;
      camShake = 8;
      if (player.integrity <= 0) { triggerCrash(impact); return; }
    }
  }

  // Cop catch
  for (const cop of cops) {
    if (cop.state !== 'CHASE') continue;
    const dist = Math.hypot(player.x - cop.x, player.y - cop.y);
    if (dist < cop.catchDist) {
      triggerCrash(8);
      return;
    }
  }
}

function updatePeds() {
  const PED_SPEED = 0.55;
  for (const p of peds) {
    if (p.state === 'WALK') {
      const nx = p.x + Math.cos(p.angle) * PED_SPEED;
      const ny = p.y + Math.sin(p.angle) * PED_SPEED;
      // Only move if destination is sidewalk or road (not building/out of bounds)
      const destType = (tileMap[Math.floor(ny/T)] && tileMap[Math.floor(ny/T)][Math.floor(nx/T)] || {}).type;
      if (destType === 'sidewalk' || destType === 'road') {
        p.x = nx;
        p.y = ny;
      } else {
        // Bounce: pick a new sidewalk-safe direction (perpendicular or reverse)
        const turns = [Math.PI/2, -Math.PI/2, Math.PI, -Math.PI*0.25, Math.PI*0.25];
        p.angle += turns[Math.floor(Math.random()*turns.length)];
        p.timer = 40 + Math.floor(Math.random()*80);
      }
      p.timer--;
      if (p.timer <= 0) {
        // Randomly turn 90° left or right to stay on grid
        const turns90 = [0, Math.PI/2, -Math.PI/2, Math.PI];
        p.angle = turns90[Math.floor(Math.random()*turns90.length)];
        p.timer = 80 + Math.floor(Math.random()*160);
      }
    } else if (p.state === 'FLEE') {
      const awayAngle = Math.atan2(p.y - player.y, p.x - player.x);
      const fx = p.x + Math.cos(awayAngle) * 2.2;
      const fy = p.y + Math.sin(awayAngle) * 2.2;
      const ft = (tileMap[Math.floor(fy/T)] && tileMap[Math.floor(fy/T)][Math.floor(fx/T)] || {}).type;
      if (ft === 'sidewalk' || ft === 'road') { p.x = fx; p.y = fy; }
      p.timer--;
      if (p.timer <= 0) { p.state = 'WALK'; p.timer = 100; p.angle = Math.random()*Math.PI*2; }
    }
  }
}

function updateCouriers() {
  for (const c of couriers) {
    const rg = roadGraph.h[c.routeIdx];
    if (!rg) continue;
    c.y += (rg.y - c.y) * 0.08;
    c.speed += (c.grade.speed - c.speed) * 0.04;
    c.speed = Math.min(c.speed, c.grade.speed); // cap
    const dx = Math.cos(c.angle) * c.speed;
    c.x += dx;
    if (c.x > rg.xMax - T) {
      c.routeDir = -1;
      c.angle = -Math.PI/2;
      c.x = rg.xMax - T;
    }
    if (c.x < rg.xMin + T) {
      c.routeDir = 1;
      c.angle = Math.PI/2;
      c.x = rg.xMin + T;
    }
    // Occasionally switch road
    if (Math.random() < 0.001) {
      const ni = Math.floor(Math.random()*roadGraph.h.length);
      c.routeIdx = ni;
    }
  }
}

function updateCars() {
  for (const car of cars) {
    const rg = roadGraph.h[car.routeIdx];
    if (!rg) continue;

    // Snap Y to lane — small lerp, but hard-clamp so car never drifts far off road
    const laneY = rg.y + car.dir * T * 0.4;
    car.y += (laneY - car.y) * 0.12;
    car.y = Math.max(laneY - T, Math.min(laneY + T, car.y)); // clamp to ±1 tile

    // Look-ahead
    const lookDist = 48;
    let blocked = false;
    const lookX = car.x + car.dir * lookDist;
    for (const other of cars) {
      if (other === car) continue;
      if (Math.abs(other.y - car.y) < 20 && Math.abs(other.x - lookX) < 32 && Math.sign(other.x - car.x) === car.dir) {
        blocked = true; break;
      }
    }
    if (Math.abs(player.y - car.y) < 20 && Math.abs(player.x - lookX) < 30 && Math.sign(player.x - car.x) === car.dir) {
      blocked = true;
    }

    car.braking = blocked;
    const ts = blocked ? 0 : car.targetSpeed;
    car.speed += (ts - car.speed) * 0.08;
    car.speed = Math.max(0, Math.min(car.targetSpeed, car.speed)); // cap
    car.x += car.dir * car.speed;

    // Wrap X within road bounds
    if (car.x > rg.xMax + T) car.x = rg.xMin - T;
    if (car.x < rg.xMin - T) car.x = rg.xMax + T;

    // Switch road — teleport Y immediately to avoid cross-world drift
    if (Math.random() < 0.001) {
      const ni = 1 + Math.floor(Math.random()*(roadGraph.h.length-2));
      car.routeIdx = ni;
      car.dir = Math.random()<0.5?1:-1;
      car.angle = car.dir > 0 ? Math.PI/2 : -Math.PI/2;
      const nrg = roadGraph.h[ni];
      if (nrg) car.y = nrg.y + car.dir * T * 0.4; // teleport, not lerp
    }
  }
}

function updateCops() {
  for (const cop of cops) {
    const dist = Math.hypot(player.x - cop.x, player.y - cop.y);
    if (cop.state === 'IDLE') {
      if (dist < cop.spawnDist && Math.abs(player.speed) > 3) {
        cop.state = 'CHASE';
        GS.bannerText = '🚔 МЕНТ! УХОДИ!';
        GS.bannerTimer = 120;
      }
    } else if (cop.state === 'CHASE') {
      const chase = 4.5 + UP.motor * 0.2;
      const a = Math.atan2(player.y - cop.y, player.x - cop.x);
      cop.x += Math.cos(a) * chase;
      cop.y += Math.sin(a) * chase;
      cop.angle = a + Math.PI/2;
      cop.sirenTimer++;
    }
  }
}

function updateDebris() {
  for (const d of debris) {
    d.x += d.vx;
    d.y += d.vy;
    d.vx *= 0.94;
    d.vy *= 0.94;
    d.angle += d.spin;
    d.spin *= 0.96;
    d.life -= d.decay;
  }
  debris = debris.filter(d => d.life > 0);
}

function updateAmbulance() {
  if (!ambulance) return;
  if (ambulance.state === 'APPROACH') {
    const a = Math.atan2(player.y - ambulance.y, player.x - ambulance.x);
    ambulance.speed += (6 - ambulance.speed) * 0.06;
    ambulance.x += Math.cos(a) * ambulance.speed;
    ambulance.y += Math.sin(a) * ambulance.speed;
    ambulance.angle = a + Math.PI/2;
    const dist = Math.hypot(player.x - ambulance.x, player.y - ambulance.y);
    if (dist < 30) {
      ambulance.state = 'EXPLODE';
      ambulance.timer = 60;
      camShake = 25;
      // Extra debris
      for (let i = 0; i < 12; i++) {
        const ba = Math.random()*Math.PI*2;
        const bs = 3 + Math.random()*6;
        debris.push({
          x: ambulance.x, y: ambulance.y,
          vx: Math.cos(ba)*bs, vy: Math.sin(ba)*bs,
          angle:0, spin:(Math.random()-0.5)*0.4,
          size:6+Math.random()*14, life:1, decay:0.012,
          color:['#ff4400','#ffaa00','#fff','#ff0000','#ff6600'][Math.floor(Math.random()*5)],
        });
      }
    }
  } else if (ambulance.state === 'EXPLODE') {
    ambulance.timer--;
    if (ambulance.timer <= 0) ambulance = null;
  }
}

// ─── HUD ─────────────────────────────────────────────────────────────────────
function updateHUD() {
  const st = upStat();
  const kmh = Math.round(Math.abs(player.speed) * 3.6 * 3);
  document.getElementById('speed-value').textContent = kmh;
  document.getElementById('coins').textContent = GS.coins;
  document.getElementById('score').textContent = GS.score;
  document.getElementById('boost-fill').style.width = (player.boost / st.boostDur * 100) + '%';
  document.getElementById('integrity-fill').style.width = Math.max(0,player.integrity) + '%';

  const banner = document.getElementById('trick-banner');
  if (GS.bannerTimer > 0) {
    banner.textContent = GS.bannerText;
    banner.style.opacity = Math.min(1, GS.bannerTimer / 30);
  } else {
    banner.style.opacity = 0;
  }

  const cd = document.getElementById('combo-display');
  if (GS.comboMult > 1) {
    cd.style.display='block';
    document.getElementById('combo-mult').textContent = GS.comboMult;
  } else {
    cd.style.display='none';
  }
}

// ─── DRAW ─────────────────────────────────────────────────────────────────────
function draw() {
  const v = GS.vitality;
  ctx.clearRect(0,0,W,H);

  const sx = Math.round(camX + (camShake>0?(Math.random()-0.5)*camShake*2:0));
  const sy = Math.round(camY + (camShake>0?(Math.random()-0.5)*camShake*2:0));

  ctx.save();
  ctx.translate(-sx, -sy);

  drawWorld(v, sx, sy);
  drawTrees(v);
  drawBuildings(v);
  drawCars(v);
  drawCouriers(v);
  drawPeds(v);
  drawCops(v);
  drawDebris();
  if (ambulance) drawAmbulance(v);
  drawPlayer(v);

  ctx.restore();
}

function drawWorld(v, sx, sy) {
  // Background tiles — only draw visible area
  const TW = C.GW * STEP + C.ROAD;
  const TH = C.GH * STEP + C.ROAD;
  const txMin = Math.max(0, Math.floor(sx / T) - 1);
  const txMax = Math.min(TW-1, Math.ceil((sx+W) / T) + 1);
  const tyMin = Math.max(0, Math.floor(sy / T) - 1);
  const tyMax = Math.min(TH-1, Math.ceil((sy+H) / T) + 1);

  for (let ty = tyMin; ty <= tyMax; ty++) {
    for (let tx = txMin; tx <= txMax; tx++) {
      const cell = tileMap[ty] && tileMap[ty][tx];
      if (!cell) continue;
      const px = tx * T, py = ty * T;
      let c;
      switch(cell.type) {
        case 'road':     c = col('asphalt', v); break;
        case 'sidewalk': c = col('sidewalk', v); break;
        case 'lot':      c = col('grass', v); break;
        case 'building': continue; // drawn separately
        default:         c = col('grass', v);
      }
      ctx.fillStyle = c;
      ctx.fillRect(px, py, T+1, T+1);

      // Road dashes
      if (cell.type === 'road') {
        const isH = tileMap[ty-1] && tileMap[ty-1][tx] && tileMap[ty-1][tx].type === 'road';
        const isV = tileMap[ty] && tileMap[ty][tx-1] && tileMap[ty][tx-1].type === 'road';
        // Center line dashes every 2 tiles
        if (isH && (ty % (C.ROAD)) === Math.floor(C.ROAD/2) && (tx % 2)===0) {
          ctx.fillStyle = col('road_mark', v);
          ctx.fillRect(px+6, py+4, T-12, 4);
        }
        if (isV && (tx % (C.ROAD)) === Math.floor(C.ROAD/2) && (ty % 2)===0) {
          ctx.fillStyle = col('road_mark', v);
          ctx.fillRect(px+4, py+6, 4, T-12);
        }
      }
    }
  }

  // Snow on ground (light layer, fades with vitality)
  if (v < 0.7) {
    const snowAlpha = (1-v/0.7)*0.3;
    ctx.fillStyle = `rgba(200,210,220,${snowAlpha})`;
    for (let ty = tyMin; ty <= tyMax; ty++) {
      for (let tx = txMin; tx <= txMax; tx++) {
        const cell = tileMap[ty] && tileMap[ty][tx];
        if (cell && (cell.type==='sidewalk'||cell.type==='lot')) {
          ctx.fillRect(tx*T, ty*T, T, T*0.25);
        }
      }
    }
  }
}

function drawBuildings(v) {
  for (const b of buildings) {
    // Cull
    if (b.x + b.w < camX - 50 || b.x > camX + W + 50) continue;
    if (b.y + b.h < camY - 50 || b.y > camY + H + 50) continue;

    const baseColor = col('bld_' + b.type, v);
    ctx.fillStyle = baseColor;
    ctx.fillRect(b.x, b.y, b.w, b.h);

    // Stains (darker patches, fade with vitality)
    if (b.stain && v < 0.8) {
      ctx.fillStyle = `rgba(0,0,0,${(1-v)*0.25})`;
      ctx.fillRect(b.x+4, b.y+b.h*0.6, b.w*0.4, b.h*0.35);
      ctx.fillRect(b.x+b.w*0.55, b.y+b.h*0.2, b.w*0.3, b.h*0.5);
    }

    // Windows
    const cols = b.winGrid;
    const rows = b.floors;
    const wp = b.w / (cols+1);
    const hp = b.h / (rows+1);
    const ws = Math.max(4, wp*0.45);
    const hs = Math.max(4, hp*0.45);
    for (let r = 0; r < rows; r++) {
      for (let wc = 0; wc < cols; wc++) {
        const lit = b.winLitMap[r*cols+wc] && v > 0.1;
        ctx.fillStyle = lit ? col('bld_win_lit', v) : col('bld_win_dark', v);
        ctx.fillRect(
          b.x + (wc+1)*wp - ws/2,
          b.y + (r+1)*hp - hs/2,
          ws, hs
        );
      }
    }

    // Snow on roof (fades with vitality)
    if (v < 0.75) {
      const sa = (1 - v/0.75)*0.85;
      ctx.fillStyle = lerpHex('#7a8090', '#e8eef4', v < 0.5 ? 0 : (v-0.5)*2);
      ctx.globalAlpha = sa * b.snow;
      ctx.fillRect(b.x, b.y, b.w, 5);
      ctx.globalAlpha = 1;
    }

    // Graffiti (appears when vivid)
    if (b.graffiti && v > 0.3) {
      ctx.globalAlpha = (v-0.3)/0.7 * 0.65;
      const gcolors = ['#ff3366','#33ff99','#ffcc00','#00ccff','#ff6600'];
      ctx.fillStyle = gcolors[Math.floor((b.x*b.y)%gcolors.length)];
      ctx.font = `bold ${Math.round(b.h*0.18)}px Courier New`;
      ctx.fillText('ГРАФФИТИ', b.x+8, b.y+b.h*0.75);
      ctx.globalAlpha = 1;
    }

    // Outline
    ctx.strokeStyle = lerpHex('#1a1a1a','#555555',v);
    ctx.lineWidth = 1;
    ctx.strokeRect(b.x, b.y, b.w, b.h);
  }
}

function drawTrees(v) {
  for (const t of trees) {
    if (t.x < camX-60 || t.x > camX+W+60 || t.y < camY-60 || t.y > camY+H+60) continue;
    // Trunk
    ctx.fillStyle = col('tree_trunk', v);
    ctx.fillRect(t.x-3, t.y-3, 6, 6);
    // Leaves (bare in grey, full in vivid)
    const leafAlpha = 0.35 + v*0.65;
    ctx.fillStyle = col('tree_leaf', v);
    ctx.globalAlpha = leafAlpha;
    ctx.beginPath();
    ctx.arc(t.x, t.y, t.r, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
    // Snow on top of tree
    if (v < 0.5) {
      ctx.fillStyle = `rgba(200,210,220,${(0.5-v)*0.7})`;
      ctx.beginPath();
      ctx.arc(t.x, t.y-t.r*0.3, t.r*0.5, 0, Math.PI*2);
      ctx.fill();
    }
  }
}

function drawPlayer(v) {
  if (!player.alive && GS.mode !== 'crash') return;
  if (!player.alive) return;

  ctx.save();
  ctx.translate(player.x, player.y);
  ctx.rotate(player.angle);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.ellipse(player.lean*6, 4, 10, 5, 0, 0, Math.PI*2);
  ctx.fill();

  // Scooter body
  const sc = lerpHex('#4a8a00','#88cc00',v);
  const sc2 = lerpHex('#2a5a00','#55aa00',v);

  ctx.fillStyle = sc;
  ctx.beginPath();
  ctx.roundRect(-8, -14, 16, 28, 4);
  ctx.fill();

  ctx.fillStyle = sc2;
  ctx.fillRect(-5, -6, 10, 12);

  // Wheels
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(0, -12, 5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(0,  12, 5, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(0, -12, 5, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(0,  12, 5, 0, Math.PI*2); ctx.stroke();

  // Rider
  const rc = lerpHex('#555','#ff6600',v*0.7);
  ctx.fillStyle = rc;
  ctx.fillRect(-6, -10, 12, 16);

  // Head
  ctx.fillStyle = lerpHex('#333','#ffaa88',v);
  ctx.beginPath(); ctx.arc(player.lean*3, -14, 5, 0, Math.PI*2); ctx.fill();

  // Boost flame
  if (player.boosting) {
    ctx.fillStyle = `rgba(255,${Math.floor(100+Math.random()*100)},0,0.9)`;
    ctx.beginPath();
    ctx.moveTo(-5, 14);
    ctx.lineTo(5, 14);
    ctx.lineTo(0, 14 + 10 + Math.random()*8);
    ctx.closePath();
    ctx.fill();
  }

  // Wheelie tilt
  if (player.wheelie) {
    // Already embedded in angle visually via lean
  }

  ctx.restore();

  // Cop siren glow when chasing
  for (const cop of cops) {
    if (cop.state === 'CHASE') {
      const dist = Math.hypot(player.x - cop.x, player.y - cop.y);
      if (dist < 300) {
        const alpha = (1 - dist/300) * 0.2 * (Math.sin(Date.now()/150)*.5+.5);
        ctx.fillStyle = `rgba(255,0,0,${alpha})`;
        ctx.fillRect(player.x-20, player.y-20, 40, 40);
      }
    }
  }
}

function drawCars(v) {
  for (const car of cars) {
    if (car.x < camX-60 || car.x > camX+W+60 || car.y < camY-60 || car.y > camY+H+60) continue;
    ctx.save();
    ctx.translate(car.x, car.y);
    ctx.rotate(car.angle);

    ctx.fillStyle = car.color;
    ctx.fillRect(-car.h/2, -car.w/2, car.h, car.w);

    // Windshield
    ctx.fillStyle = lerpHex('#1a2a2a','#446688',v);
    ctx.fillRect(-car.h/2+3, -car.w/2+3, car.h*0.35, car.w-6);

    // Headlights
    ctx.fillStyle = lerpHex('#444','#ffffcc',v);
    ctx.fillRect(car.h/2-5, -car.w/2+2, 4, 5);
    ctx.fillRect(car.h/2-5, car.w/2-7, 4, 5);

    // Brake lights
    if (car.braking) {
      ctx.fillStyle = '#ff0000';
      ctx.fillRect(-car.h/2+1, -car.w/2+2, 4, 5);
      ctx.fillRect(-car.h/2+1, car.w/2-7, 4, 5);
    }

    ctx.restore();
  }
}

function drawCouriers(v) {
  for (const c of couriers) {
    if (c.x < camX-60 || c.x > camX+W+60 || c.y < camY-60 || c.y > camY+H+60) continue;
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.rotate(c.angle);

    // Bike/scooter body
    ctx.fillStyle = c.grade.color;
    ctx.beginPath();
    ctx.roundRect(-5,-12,10,24,3);
    ctx.fill();

    // Delivery box
    ctx.fillStyle = c.grade.boxColor;
    ctx.fillRect(-8,-4,16,10);

    // Rider
    ctx.fillStyle = lerpHex('#444','#ffaa55',v*0.6);
    ctx.fillRect(-5,-8,10,12);

    ctx.restore();

    // Grade label
    ctx.fillStyle = '#fff';
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(c.grade.label, c.x, c.y - 18);
  }
}

function drawPeds(v) {
  for (const p of peds) {
    if (p.x < camX-40 || p.x > camX+W+40 || p.y < camY-40 || p.y > camY+H+40) continue;
    ctx.save();
    ctx.translate(p.x, p.y);

    if (p.state === 'FLEE') {
      ctx.fillStyle = lerpHex('#884422','#ff8844',v);
    } else {
      ctx.fillStyle = lerpHex('#555566','#8899aa',v);
    }
    ctx.fillRect(-4,-8,8,14);

    // Head
    ctx.fillStyle = lerpHex('#333','#ffaa88',v);
    ctx.beginPath(); ctx.arc(0,-10,4,0,Math.PI*2); ctx.fill();

    // Scream emoji when scared
    if (p.state === 'FLEE') {
      ctx.font = '12px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillStyle = '#fff';
      ctx.fillText('😱', 0, -20);
    }

    ctx.restore();
  }
}

function drawCops(v) {
  for (const cop of cops) {
    if (cop.x < camX-60 || cop.x > camX+W+60 || cop.y < camY-60 || cop.y > camY+H+60) continue;
    ctx.save();
    ctx.translate(cop.x, cop.y);
    ctx.rotate(cop.angle);

    // Car body
    ctx.fillStyle = lerpHex('#2a2a5a','#3a3acc',v);
    ctx.fillRect(-10,-18,20,36);

    // Roof stripe
    ctx.fillStyle = lerpHex('#3a3a3a','#ffffff',v);
    ctx.fillRect(-6,-8,12,8);

    // Siren (blink)
    const sirenOn = (cop.sirenTimer % 10) < 5;
    ctx.fillStyle = sirenOn ? '#ff0000' : '#0000ff';
    ctx.fillRect(-5,-20,8,5);
    ctx.fillStyle = sirenOn ? '#0000ff' : '#ff0000';
    ctx.fillRect(0,-20,5,5);

    ctx.restore();
  }
}

function drawDebris() {
  for (const d of debris) {
    ctx.save();
    ctx.translate(d.x, d.y);
    ctx.rotate(d.angle);
    ctx.globalAlpha = Math.min(1, d.life);
    ctx.fillStyle = d.color;
    ctx.fillRect(-d.size/2, -d.size/2, d.size, d.size);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

function drawAmbulance(v) {
  if (!ambulance) return;
  ctx.save();
  ctx.translate(ambulance.x, ambulance.y);
  ctx.rotate(ambulance.angle);

  if (ambulance.state === 'EXPLODE') {
    // Explosion flash
    const t = ambulance.timer / 60;
    ctx.fillStyle = `rgba(255,180,0,${t})`;
    ctx.beginPath();
    ctx.arc(0, 0, (1-t)*60, 0, Math.PI*2);
    ctx.fill();
  } else {
    // Ambulance body
    ctx.fillStyle = lerpHex('#3a3a3a','#ffffff',v);
    ctx.fillRect(-12, -22, 24, 44);
    ctx.fillStyle = '#ff0000';
    ctx.fillText('🚑', -10, 10);
    // Siren
    const s = (Date.now()%200)<100;
    ctx.fillStyle = s?'#ff0000':'#0000ff';
    ctx.fillRect(-6,-25,12,6);
  }

  ctx.restore();
}

// ─── SHOP ────────────────────────────────────────────────────────────────────
function openShop() {
  GS.mode = 'shop';
  document.getElementById('shop-overlay').style.display = 'flex';
  document.getElementById('shop-coins').textContent = '💰 ' + GS.coins;
  renderShopItems();
}

function closeShop() {
  GS.mode = 'play';
  document.getElementById('shop-overlay').style.display = 'none';
}

function toggleShop() {
  if (GS.mode === 'play') openShop();
  else if (GS.mode === 'shop') closeShop();
}

function renderShopItems() {
  const grid = document.getElementById('shop-grid');
  grid.innerHTML = '';
  for (const upg of UPGRADES) {
    const lv = UP[upg.id];
    const maxed = lv >= upg.maxLevel;
    const cost = maxed ? 0 : upg.costs[lv];
    const canBuy = !maxed && GS.coins >= cost;
    const div = document.createElement('div');
    div.className = 'shop-item';
    div.style.borderColor = maxed ? '#ffcc00' : canBuy ? '#444' : '#333';
    div.innerHTML = `
      <div class="si-name">${upg.name}</div>
      <div class="si-level">${upg.desc} — Lv ${lv}/${upg.maxLevel}</div>
      <div class="si-cost">${maxed ? '✅ MAXED' : (canBuy?'💰 '+cost:'🔒 '+cost)}</div>
      <div class="si-bars">${Array.from({length:upg.maxLevel},(_,i)=>`<div class="si-bar ${i<lv?'filled':''}"></div>`).join('')}</div>
    `;
    if (canBuy) {
      div.onclick = () => { GS.coins -= cost; UP[upg.id]++; renderShopItems(); document.getElementById('shop-coins').textContent='💰 '+GS.coins; };
    }
    grid.appendChild(div);
  }
}

// ─── MOBILE CONTROLS ─────────────────────────────────────────────────────────
let joyX = 0, joyY = 0;
let mobileBoost = false;
let joyActive = false;
let joyTouchId = null;
let joyBaseRect = null;

function initMobile() {
  const zone = document.getElementById('joystick-zone');
  const knob = document.getElementById('joystick-knob');
  const base = document.getElementById('joystick-base');

  zone.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.changedTouches[0];
    joyTouchId = t.identifier;
    joyActive = true;
    joyBaseRect = base.getBoundingClientRect();
  }, {passive:false});

  window.addEventListener('touchmove', e => {
    if (!joyActive) return;
    for (const t of e.changedTouches) {
      if (t.identifier !== joyTouchId) continue;
      const cx = joyBaseRect.left + 65;
      const cy = joyBaseRect.top + 65;
      const dx = t.clientX - cx;
      const dy = t.clientY - cy;
      const dist = Math.min(50, Math.hypot(dx,dy));
      const a = Math.atan2(dy,dx);
      joyX = Math.cos(a)*dist/50;
      joyY = Math.sin(a)*dist/50;
      knob.style.transform = `translate(${Math.cos(a)*dist}px, ${Math.sin(a)*dist}px)`;
    }
  }, {passive:false});

  window.addEventListener('touchend', e => {
    for (const t of e.changedTouches) {
      if (t.identifier === joyTouchId) {
        joyActive = false;
        joyX = 0; joyY = 0;
        knob.style.transform = '';
      }
    }
  });

  const btnBoost = document.getElementById('btn-boost');
  btnBoost.addEventListener('touchstart', e => { e.preventDefault(); mobileBoost=true; }, {passive:false});
  btnBoost.addEventListener('touchend',   e => { mobileBoost=false; });

  document.getElementById('btn-trick').addEventListener('touchstart', e => { e.preventDefault(); doTrick(); }, {passive:false});
  document.getElementById('btn-shop').addEventListener('touchstart',  e => { e.preventDefault(); toggleShop(); }, {passive:false});
}

// ─── GAME LOOP ────────────────────────────────────────────────────────────────
let lastTime = 0;
let running = false;

function gameLoop(ts) {
  if (!running) return;
  const dt = Math.min(32, ts - lastTime) / 16;
  lastTime = ts;

  if (GS.mode === 'play') {
    updatePlayer(dt);
    updatePeds();
    updateCouriers();
    updateCars();
    updateCops();
    updateCamera();
    updateHUD();
  } else if (GS.mode === 'crash') {
    updateDebris();
    updateAmbulance();
    updateCamera();
    if (camShake > 0) camShake--;
  }

  draw();
  requestAnimationFrame(gameLoop);
}

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('shop-overlay').style.display = 'none';

  GS.mode = 'play';
  GS.score = 0;
  GS.vitality = 0;
  GS.targetVitality = 0;
  GS.comboMult = 1;
  GS.bannerTimer = 0;
  trickCombo = [];
  comboTimer = 0;
  debris = [];
  ambulance = null;
  crashPhase = null;

  genWorld();
  resetPlayer();
  spawnPeds(60);
  spawnCouriers(14);
  spawnCars(22);
  spawnCop();

  camX = player.x - W/2;
  camY = player.y - H/2;

  if (!running) {
    running = true;
    requestAnimationFrame(ts => { lastTime=ts; gameLoop(ts); });
  }
}

// ─── INIT ────────────────────────────────────────────────────────────────────
initMobile();
// Canvas.roundRect polyfill for older browsers
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r) {
    this.beginPath();
    this.moveTo(x+r,y);
    this.lineTo(x+w-r,y);
    this.quadraticCurveTo(x+w,y,x+w,y+r);
    this.lineTo(x+w,y+h-r);
    this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    this.lineTo(x+r,y+h);
    this.quadraticCurveTo(x,y+h,x,y+h-r);
    this.lineTo(x,y+r);
    this.quadraticCurveTo(x,y,x+r,y);
    this.closePath();
  };
}
